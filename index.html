    <!-- Canonical URL -->
    <link rel="canonical" href="https://aminy.app/" />

    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Aminy",
      "description": "AI-powered support for parents of neurodivergent children. Get personalized ABA guidance, behavior tracking, and connect with certified professionals.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "49.99",
        "priceCurrency": "USD",
        "offerCount": "4"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "127",
        "bestRating": "5"
      },
      "author": {
        "@type": "Organization",
        "name": "Aminy Health",
        "url": "https://aminy.app"
      },
      "featureList": [
        "AI behavioral coach powered by Claude",
        "BCBA-supervised guidance",
        "Behavior incident tracking",
        "Progress monitoring and outcomes",
        "Telehealth appointments",
        "Secure document vault",
        "Community support",
        "Multi-child profiles"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Aminy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Aminy is an AI-powered app that provides personalized ABA (Applied Behavior Analysis) support for parents of neurodivergent children, including those with autism, ADHD, and developmental delays."
          }
        },
        {
          "@type": "Question",
          "name": "Is Aminy HIPAA compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Aminy is designed with HIPAA compliance in mind. We use encrypted data storage, audit logging, and secure messaging to protect your family's health information."
          }
        },
        {
          "@type": "Question",
          "name": "Can I connect with real BCBAs through Aminy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Aminy offers telehealth sessions with certified BCBAs (Board Certified Behavior Analysts) and RBTs (Registered Behavior Technicians) for personalized support."
          }
        }
      ]
    }
    </script>

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load Manrope font (primary) and Inter (fallback) with display=swap for FOUT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics - Only loads if measurement ID is configured -->
    <script>
      // GA4 will be initialized by the app if VITE_GA_MEASUREMENT_ID is set
      // This is the gtag.js setup that waits for the measurement ID
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    </script>

    <!-- Inline critical CSS for faster FCP -->
    <style>
      /* Prevent layout shift during load */
      :root {
        --vh: 1vh;
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        /* Brand colors */
        --brand-navy: #0D1B2A;
        --brand-cream: #F5F5F5;
        --brand-teal: #577590;
        --brand-coral: #E07A5F;
      }
      html {
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: calc(var(--vh, 1vh) * 100);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--brand-cream);
        color: var(--brand-navy);
      }
      /* Prevent FOUC */
      html { visibility: visible; opacity: 1; }
      /* Safe area padding */
      .safe-top { padding-top: var(--safe-area-inset-top); }
      .safe-bottom { padding-bottom: var(--safe-area-inset-bottom); }
      /* Loading spinner for initial load */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid var(--brand-cream);
        border-top-color: var(--brand-teal);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
      <!-- Set viewport height correctly on mobile -->
      <script>
        (function() {
          const vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
