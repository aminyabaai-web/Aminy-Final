<!-- @dsCard group="Website" viewport="1280x900" name="Legal & static pages" subtitle="Terms · Privacy policy · Notice of Privacy Practices — responsive" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Aminy — Legal</title>
<link rel="icon" href="../../assets/favicon.svg"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-ui);color:var(--color-text);background:#fff;-webkit-font-smoothing:antialiased;}
  nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--color-border);}
  .nav-in{max-width:1080px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 24px;}
  .nav-in img{height:26px;display:block;}
  .nav-in a{font-size:14px;font-weight:600;color:var(--aminy-teal-700);text-decoration:none;}
  .wrap{max-width:1080px;margin:0 auto;padding:40px 24px 80px;display:grid;grid-template-columns:230px 1fr;gap:48px;align-items:start;}
  .side{position:sticky;top:88px;display:flex;flex-direction:column;gap:4px;}
  .side button{text-align:left;padding:10px 14px;border-radius:11px;border:0;background:none;cursor:pointer;font-family:var(--font-ui);font-size:14px;font-weight:500;color:var(--aminy-navy-500);}
  .side button.on{background:var(--aminy-teal-50);color:var(--aminy-teal-800);font-weight:600;box-shadow:inset 3px 0 0 var(--aminy-teal-600);}
  h1{font-size:32px;font-weight:800;letter-spacing:-0.028em;color:var(--color-text-strong);margin:0 0 6px;}
  .meta{font-size:13px;color:var(--color-text-muted);margin-bottom:28px;}
  .doc h2{font-size:19px;font-weight:700;letter-spacing:-0.015em;color:var(--color-text-strong);margin:30px 0 10px;}
  .doc p,.doc li{font-size:15px;line-height:1.7;color:var(--aminy-navy-500);margin:0 0 12px;}
  .doc ul{padding-left:20px;margin:0 0 12px;}
  .callout{background:var(--aminy-teal-50);border:1px solid var(--aminy-teal-100);border-radius:14px;padding:16px 18px;font-size:14px;line-height:1.65;color:var(--aminy-teal-800);margin:0 0 26px;}
  .tldr{background:var(--aminy-mist);border:1px solid var(--color-border);border-radius:14px;padding:16px 18px;margin:0 0 8px;}
  .tldr b{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:6px;}
  .tldr span{font-size:14.5px;line-height:1.6;color:var(--color-text);}
  @media (max-width:860px){
    .wrap{grid-template-columns:1fr;gap:20px;padding:24px 18px 60px;}
    .side{position:static;flex-direction:row;overflow-x:auto;gap:8px;padding-bottom:4px;}
    .side button{white-space:nowrap;border:1px solid var(--color-border);border-radius:999px;}
    .side button.on{box-shadow:none;border-color:var(--aminy-teal-600);}
    h1{font-size:26px;}
  }
</style></head>
<body>
<nav><div class="nav-in"><img src="../../assets/aminy_logo.png" alt="aminy"/><a href="index.html">← Back to aminy.ai</a></div></nav>
<div class="wrap">
  <aside class="side" id="side"></aside>
  <main id="main"></main>
</div>
<script>
const DOCS = {
  terms: { title: "Terms of Service", date: "Effective June 1, 2026", tldr: "Aminy is a care-support platform, not a medical provider. Be kind, keep your account secure, cancel anytime.",
    sections: [
      ["1. What Aminy is (and isn't)", "Aminy provides software that supports families and clinicians: an AI coach, care coordination, telehealth scheduling, and practice tools. Aminy's AI never replaces the clinical judgment of licensed professionals, and nothing in the app is medical advice. Clinical services are delivered by independent licensed providers."],
      ["2. Your account", "You must be 18+ to create an account. You're responsible for keeping your credentials secure and for activity under your account. Caregiver seats you invite are your responsibility to manage."],
      ["3. Subscriptions & billing", "Paid plans start with a 14-day free trial — no card required to begin. Subscriptions renew automatically; you can cancel anytime in Settings and keep access through the period you've paid for. Marketplace sessions are billed per session at the price shown before you book."],
      ["4. Acceptable use", "Don't misuse the platform: no scraping, no attempting to access others' data, no using the AI coach for emergencies. In a crisis, call 988 or 911."],
      ["5. Termination & changes", "You can delete your account anytime (Settings → Privacy). We may update these terms; if a change is material we'll tell you in the app at least 30 days before it takes effect."],
    ]},
  privacy: { title: "Privacy Policy", date: "Effective June 1, 2026", tldr: "Your child's data is yours. We never sell it, you can see everything the AI knows, and you can export or delete it all.",
    sections: [
      ["1. What we collect", "Account details, the information you share about your child (routines, notes, documents you upload), usage data, and — when you use telehealth — session metadata. You can see what the AI has learned at Settings → What Aminy knows."],
      ["2. How we use it", "To personalize coaching, coordinate care with the providers you choose, process claims you ask us to help with, and improve the service. We never sell personal data, and we never use your child's data to advertise to you."],
      ["3. Who can see it", "You and the caregivers you invite; the providers you connect with (only what's needed for care); payers, only when you direct us to (e.g., claims). Our subprocessors are bound by data-protection agreements."],
      ["4. Your controls", "Export everything (Settings → Export my data), clear the AI's memory, or delete your account entirely. Deletion requests are honored within 30 days, subject to records we're legally required to keep."],
      ["5. Security & children", "Data is encrypted in transit and at rest. Ease collects only what's needed for the child experience (check-ins, stars, drawings the child chooses to send) and is controlled from the parent account."],
    ]},
  npp: { title: "Notice of Privacy Practices", date: "Effective June 1, 2026 · HIPAA", tldr: "How health information may be used and disclosed for treatment, payment, and operations — and your rights over it.",
    sections: [
      ["Our duties", "When Aminy operates on behalf of covered providers, protected health information (PHI) is handled under HIPAA. We're required to maintain its privacy, give you this notice, and notify you of any breach."],
      ["How PHI may be used", "Treatment (sharing with your care team), payment (claims to your insurer at your direction), and health-care operations (quality and safety). Other uses — like research or marketing — require your written authorization."],
      ["Your rights", "You may inspect and obtain a copy of your records, request corrections, request restrictions, receive an accounting of disclosures, and file a complaint with us or with HHS — never with retaliation."],
      ["Contact", "Privacy Officer · privacy@aminy.ai. Complaints may also be filed with the U.S. Department of Health & Human Services, Office for Civil Rights."],
    ]},
};
const order = ["terms", "privacy", "npp"];
const side = document.getElementById('side'), main = document.getElementById('main');
function render(id){
  side.innerHTML = order.map(k=>'<button class="'+(k===id?'on':'')+'" onclick="render(\''+k+'\')">'+DOCS[k].title+'</button>').join('');
  const d = DOCS[id];
  main.innerHTML = '<h1>'+d.title+'</h1><div class="meta">'+d.date+'</div>'+
    '<div class="tldr"><b>The short version</b><span>'+d.tldr+'</span></div>'+
    '<div class="callout">⚠️ Reference design — final language must be reviewed and approved by counsel before publishing.</div>'+
    '<div class="doc">'+d.sections.map(s=>'<h2>'+s[0]+'</h2><p>'+s[1]+'</p>').join('')+'</div>';
  window.scrollTo({top:0});
}
render('terms');
</script>
</body></html>
