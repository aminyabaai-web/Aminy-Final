<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Aminy Parent · UI Kit</title>
<link rel="icon" href="../../assets/favicon.svg"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0;height:100%;}
  body{background:radial-gradient(circle at 50% 0%, #ffffff, var(--aminy-mist) 40%, var(--aminy-mist-deep));font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;padding:20px 0;min-height:100vh;overflow:hidden;}
  #scaler{transform-origin:center center;transition:transform .15s ease;}
  #root{display:flex;justify-content:center;}
  /* Hide scrollbars on the phone mockup — finger/wheel scroll still works */
  #root *::-webkit-scrollbar{width:0;height:0;background:transparent;}
  #root *{scrollbar-width:none;-ms-overflow-style:none;}
  *{box-sizing:border-box;}
</style>
</head>
<body>
<div id="scaler"><div id="root"></div></div>
<script>
  // Fit the 390px phone frame to short viewports (scale down only, cap 1x).
  function fitPhone(){
    var s=document.getElementById('scaler');
    if(!s) return;
    var k=Math.min(window.innerHeight/(816+24), 1);
    s.style.transform='scale('+k.toFixed(3)+')';
  }
  window.addEventListener('resize',fitPhone);
  setInterval(fitPhone,500);
  fitPhone();
</script>
