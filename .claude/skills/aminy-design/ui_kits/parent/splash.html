<!-- @dsCard group="Parent app" viewport="700x420" name="Splash → Welcome" subtitle="2s brand moment, then auto-handoff to sign-on (or Home if signed in)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#fff;font-family:var(--font-ui);height:420px;display:flex;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased;}
  .stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s var(--ease-calm);}
  /* splash */
  #splash img{width:190px;height:auto;animation:aminy-pop 700ms var(--ease-lift) both;}
  #splash .tag{font-size:11.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--aminy-navy-500);animation:aminy-fade-up 600ms var(--ease-calm) 450ms both;}
  .dots{position:absolute;bottom:34px;display:flex;gap:5px;}
  .dots span{width:6px;height:6px;border-radius:999px;background:var(--aminy-teal-400);animation:aminy-think 1.1s ease-in-out infinite;}
  .dots span:nth-child(2){animation-delay:.18s;}
  .dots span:nth-child(3){animation-delay:.36s;}
  /* welcome (sign-on) */
  #welcome{display:none;background:linear-gradient(180deg,#fff,var(--aminy-mist));}
  #welcome img{width:120px;height:auto;}
  #welcome h2{font-size:17px;font-weight:700;letter-spacing:-0.02em;color:var(--color-text-strong);margin:0;}
  .btns{display:flex;flex-direction:column;gap:8px;width:250px;}
  .b{height:42px;border-radius:12px;font-family:var(--font-ui);font-weight:600;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;border:0;}
  .b.apple{background:#0C2230;color:#fff;}
  .b.google{background:#fff;color:var(--color-text-strong);border:1px solid var(--color-border-strong);}
  .b.email{background:var(--aminy-teal-600);color:#fff;box-shadow:var(--shadow-cta);}
  .signin{font-size:12px;color:var(--color-text-muted);font-weight:600;}
  .signin b{color:var(--aminy-teal-700);cursor:pointer;}
  .replay{position:absolute;bottom:12px;right:14px;font-size:11px;font-weight:600;color:var(--color-text-subtle);background:none;border:0;cursor:pointer;font-family:var(--font-ui);}
  @media (prefers-reduced-motion: reduce){#splash img,#splash .tag{animation:none;}}
</style></head>
<body>
  <div class="stage" id="splash">
    <img src="../../assets/aminy_logo.png" alt="aminy"/>
    <div class="tag">Gentle guidance · Meaningful progress</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <div class="stage" id="welcome">
    <img src="../../assets/aminy_logo.png" alt="aminy"/>
    <h2>The calm center of your child's care.</h2>
    <div class="btns">
      <button class="b apple"> Continue with Apple</button>
      <button class="b google">G&nbsp; Continue with Google</button>
      <button class="b email">Continue with email</button>
    </div>
    <div class="signin">Already have an account? <b>Sign in</b></div>
  </div>
  <button class="replay" onclick="replay()">↺ Replay splash</button>
  <script>
    var t;
    function run(){
      var s=document.getElementById('splash'), w=document.getElementById('welcome');
      s.style.display='flex'; w.style.display='none';
      clearTimeout(t);
      t=setTimeout(function(){ s.style.display='none'; w.style.display='flex'; },2300);
    }
    function replay(){
      var s=document.getElementById('splash');
      var img=s.querySelector('img'), tag=s.querySelector('.tag');
      img.style.animation='none';tag.style.animation='none';
      void img.offsetWidth;
      img.style.animation='';tag.style.animation='';
      run();
    }
    run();
  </script>
</body></html>
