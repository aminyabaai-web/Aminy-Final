<style>

  body{background:var(--aminy-navy-50);font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden;}
  #scaler{transform-origin:center center;transition:transform .15s ease;}
  #root{display:flex;justify-content:center;}
  #root *::-webkit-scrollbar{width:0;height:0;background:transparent;}
  #root *{scrollbar-width:none;-ms-overflow-style:none;}

</style>

<div id="scaler"><div id="root"></div></div>
<script>
  function fit(){var s=document.getElementById('scaler');if(!s)return;var k=Math.min(window.innerWidth/(1240+40),window.innerHeight/(800+110),1);s.style.transform='scale('+k.toFixed(3)+')';}
  window.addEventListener('resize',fit);setInterval(fit,500);fit();
</script>
