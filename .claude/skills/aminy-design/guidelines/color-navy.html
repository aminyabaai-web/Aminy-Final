<!-- @dsCard group="Colors" viewport="700x190" name="Navy — the voice" subtitle="The most common ink: headlines, body, nav, trust" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);font-family:var(--font-ui);padding:20px;}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw .hex{font-size:11px;font-weight:600;letter-spacing:.01em;}
  .sw .nm{font-size:10px;opacity:.75;}
  .cap{margin-top:10px;font-size:12px;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--aminy-navy-950);color:#fff"><span class="nm">950</span><span class="hex">#0C2230</span></div>
    <div class="sw" style="background:var(--aminy-navy-800);color:#fff"><span class="nm">800</span><span class="hex">#132F43</span></div>
    <div class="sw" style="background:var(--aminy-navy-700);color:#fff"><span class="nm">700</span><span class="hex">#1e293b</span></div>
    <div class="sw" style="background:var(--aminy-navy-500);color:#fff"><span class="nm">500</span><span class="hex">#475569</span></div>
    <div class="sw" style="background:var(--aminy-navy-300);color:var(--aminy-navy-950)"><span class="nm">300</span><span class="hex">#94a3b8</span></div>
    <div class="sw" style="background:var(--aminy-navy-100);color:var(--aminy-navy-950)"><span class="nm">100</span><span class="hex">#e2e8f0</span></div>
    <div class="sw" style="background:var(--aminy-navy-50);color:var(--aminy-navy-950)"><span class="nm">50</span><span class="hex">#f1f5f9</span></div>
  </div>
  <div class="cap">Navy is voice, not decoration — <code>--text-strong</code> = 950, body = 700, muted = 400.</div>
</body></html>
