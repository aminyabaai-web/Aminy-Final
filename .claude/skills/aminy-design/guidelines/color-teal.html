<!-- @dsCard group="Colors" viewport="700x190" name="Teal — the one pointer" subtitle="Primary accent: CTAs, active state, progress, the compass needle" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);font-family:var(--font-ui);padding:20px;}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw .hex{font-size:11px;font-weight:600;}
  .sw .nm{font-size:10px;opacity:.75;}
  .cap{margin-top:10px;font-size:12px;color:var(--color-text-muted);}
  .cap b{color:var(--aminy-teal-700);}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--aminy-teal-900);color:#fff"><span class="nm">900</span><span class="hex">#0F3A48</span></div>
    <div class="sw" style="background:var(--aminy-teal-700);color:#fff"><span class="nm">700</span><span class="hex">#216982</span></div>
    <div class="sw" style="background:var(--aminy-teal-600);color:#fff"><span class="nm">600 ·primary</span><span class="hex">#2A7D99</span></div>
    <div class="sw" style="background:var(--aminy-teal-500);color:#fff"><span class="nm">500</span><span class="hex">#4795AE</span></div>
    <div class="sw" style="background:var(--aminy-teal-300);color:var(--aminy-teal-900)"><span class="nm">300</span><span class="hex">#9FCCDA</span></div>
    <div class="sw" style="background:var(--aminy-teal-100);color:var(--aminy-teal-900)"><span class="nm">100</span><span class="hex">#E2EFF3</span></div>
    <div class="sw" style="background:var(--aminy-teal-50);color:var(--aminy-teal-900)"><span class="nm">50</span><span class="hex">#F1F8FA</span></div>
  </div>
  <div class="cap"><b>One teal element per view.</b> If three things are teal, two are wrong.</div>
</body></html>
