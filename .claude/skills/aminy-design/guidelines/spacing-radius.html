<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="Soft. Nothing sharper than 8px in the parent app." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);padding:20px;font-family:var(--font-ui);}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:72px;height:60px;background:#fff;border:1px solid var(--color-border);box-shadow:var(--shadow-sm);border-bottom:3px solid var(--aminy-teal-600);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm·8 input</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md·12 button</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg·16 card</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl·22 hero</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="n">2xl·28 modal</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full);width:60px;height:60px"></div><span class="n">full · pill</span></div>
  </div>
</body></html>
