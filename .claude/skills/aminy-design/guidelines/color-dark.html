<!-- @dsCard group="Colors" viewport="700x200" name="Dark mode" subtitle="Token-only overlay — deep navy surfaces, desaturated teal. Auto on system, or [data-theme]." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-ui);}
  .row{display:flex;}
  .pane{flex:1;padding:18px 20px;min-height:200px;box-sizing:border-box;}
  .light{background:var(--aminy-mist);}
  .card{background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow-sm);}
  .ey{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--aminy-teal-700);display:inline-flex;align-items:center;gap:6px;margin-bottom:6px;}
  .ey::before{content:"";width:6px;height:6px;border-radius:999px;background:var(--aminy-teal-500);}
  .h{font-size:16px;font-weight:700;color:var(--color-text-strong);letter-spacing:-0.02em;}
  .b{font-size:13px;color:var(--color-text-muted);margin-top:4px;line-height:1.5;}
  .btn{margin-top:12px;display:inline-block;background:var(--aminy-teal-600);color:#fff;font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--radius-md);box-shadow:var(--shadow-cta);}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--color-text-subtle);margin-top:12px;}
</style></head>
<body>
  <div class="row">
    <div class="pane light">
      <div class="card"><div class="ey">From Aminy</div><div class="h">Here's Kai's calm start</div><div class="b">Same components, light tokens.</div><span class="btn">See my plan</span></div>
      <div class="lab">light · default</div>
    </div>
    <div class="pane light" data-theme="dark">
      <div class="card"><div class="ey">From Aminy</div><div class="h">Here's Kai's calm start</div><div class="b">Same components, dark tokens. Zero component edits.</div><span class="btn">See my plan</span></div>
      <div class="lab">dark · [data-theme="dark"]</div>
    </div>
  </div>
</body></html>
