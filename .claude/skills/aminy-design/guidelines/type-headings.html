<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>

<body>
  <div class="src">
    <img src="../assets/aminy_logo.png" alt="aminy logo"/>

  </div>
  <div class="stack">
    <div><span class="lab">.aminy-display · Fredoka 36/500</span><div class="aminy-display">A calm hub, not a dashboard.</div></div>
    <div><span class="lab">.aminy-h1 · Fredoka 30/500</span><div class="aminy-h1">Here's Kai's calm start today</div></div>
    <div><span class="lab">.aminy-h2 · Schibsted 20/600 (crisp)</span><div class="aminy-h2">Today's routine</div></div>
    <div><span class="lab">.aminy-h3 · Schibsted 18/600</span><div class="aminy-h3">This week's win</div></div>
  </div>
