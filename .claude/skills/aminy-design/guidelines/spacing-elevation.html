<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft 'bevel' shadows — never harsh black. Teal glow marks the CTA." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);padding:24px;font-family:var(--font-ui);}
  .row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:96px;height:64px;background:#fff;border-radius:var(--radius-lg);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm · resting</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md · hover</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl · header</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-cta);background:var(--aminy-teal-600)"></div><span class="n">cta · teal glow</span></div>
  </div>
</body></html>
