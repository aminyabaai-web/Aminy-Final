<!-- @dsCard group="Colors" viewport="700x200" name="Surfaces — the exhale" subtitle="Mist backgrounds (never pure white). White is elevated only." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:linear-gradient(180deg,var(--aminy-mist),var(--aminy-mist-deep));font-family:var(--font-ui);padding:20px;}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:104px;border-radius:var(--radius-lg);border:1px solid var(--color-border);display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;}
  .sw .nm{font-size:11px;font-weight:600;color:var(--color-text-strong);}
  .sw .hex{font-size:10px;color:var(--color-text-muted);}
  .cap{margin-top:12px;font-size:12px;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--aminy-mist)"><span class="nm">Mist</span><span class="hex">#F6FBFB · app bg top</span></div>
    <div class="sw" style="background:var(--aminy-mist-deep)"><span class="nm">Mist deep</span><span class="hex">#EDF4F7 · app bg bottom</span></div>
    <div class="sw" style="background:#ffffff;box-shadow:var(--shadow-md)"><span class="nm">White</span><span class="hex">#FFFFFF · elevated card</span></div>
    <div class="sw" style="background:var(--aminy-paper)"><span class="nm">Paper</span><span class="hex">#FAFAFA</span></div>
  </div>
  <div class="cap">The mist gradient makes white cards feel elevated. Don't fight it with a white page.</div>
</body></html>
