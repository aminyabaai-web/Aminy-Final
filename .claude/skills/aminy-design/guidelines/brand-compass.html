<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);padding:0;font-family:var(--font-ui);}
  .wrap{height:200px;display:flex;align-items:center;justify-content:center;gap:48px;background:#fff;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--color-text-muted);}
  .cell img{display:block;width:auto;}
  .s-app img{height:40px;}
  .s-md img{height:64px;}
  .s-hero img{height:104px;}
  .lab{font-family:var(--font-mono);font-size:10px;opacity:.7;}
</style></head>
<body>
  <div class="wrap">
    <div class="cell s-app"><img src="../assets/aminy_compass.png" alt="Aminy compass mark"/><span class="lab">app icon · 40px</span></div>
    <div class="cell s-md"><img src="../assets/aminy_compass.png" alt="Aminy compass mark"/><span class="lab">standard · 64px</span></div>
    <div class="cell s-hero"><img src="../assets/aminy_compass.png" alt="Aminy compass mark"/><span class="lab">hero · 104px</span></div>
  </div>
</body></html>
