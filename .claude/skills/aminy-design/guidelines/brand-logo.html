<!-- @dsCard group="Brand" viewport="700x300" name="Logo & wordmark" subtitle="Real horizontal logo (primary) + a tagline lockup built from the same artwork." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);font-family:var(--font-ui);padding:0;}
  .wrap{min-height:300px;display:flex;flex-direction:column;}
  .stage{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:20px;}
  .panel{background:#fff;border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;gap:16px;}
  .panel img{display:block;max-width:100%;height:auto;}
  .primary img{height:54px;}
  .lockup img{height:50px;}
  .tagline{
    font-family:var(--font-brand);font-weight:500;
    font-size:12px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--aminy-navy-800);text-align:center;line-height:1.5;
  }
  .cap{display:flex;justify-content:space-between;align-items:center;padding:0 22px 16px;}
  .cap .t{font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="wrap">
    <div class="stage">
      <div class="panel primary"><img src="../assets/aminy_logo.png" alt="aminy — compass mark and wordmark"/></div>
      <div class="panel lockup">
        <img src="../assets/aminy_logo.png" alt="aminy — compass mark and wordmark"/>
        <div class="tagline">Gentle&nbsp;guidance.<br/>Meaningful&nbsp;progress.</div>
      </div>
    </div>
    <div class="cap">
      <span class="t">assets/aminy_logo.png · horizontal primary</span>
      <span class="t">tagline lockup · same artwork + Fredoka caps</span>
    </div>
  </div>
</body></html>
