<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4-point grid · 4 → 80px" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--aminy-mist);padding:20px;font-family:var(--font-ui);}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--aminy-teal-600);border-radius:var(--radius-xs);width:22px;}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:var(--space-1)"></div><span class="n">1·4</span></div>
    <div class="item"><div class="bar" style="height:var(--space-2)"></div><span class="n">2·8</span></div>
    <div class="item"><div class="bar" style="height:var(--space-3)"></div><span class="n">3·12</span></div>
    <div class="item"><div class="bar" style="height:var(--space-4)"></div><span class="n">4·16</span></div>
    <div class="item"><div class="bar" style="height:var(--space-6)"></div><span class="n">6·24</span></div>
    <div class="item"><div class="bar" style="height:var(--space-8)"></div><span class="n">8·32</span></div>
    <div class="item"><div class="bar" style="height:var(--space-12)"></div><span class="n">12·48</span></div>
    <div class="item"><div class="bar" style="height:var(--space-16)"></div><span class="n">16·64</span></div>
    <div class="item"><div class="bar" style="height:var(--space-20)"></div><span class="n">20·80</span></div>
  </div>
</body></html>
