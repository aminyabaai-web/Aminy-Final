<!-- @dsCard group="Colors" viewport="700x180" name="Ease (kid) palette" subtitle="Soft sky / indigo / mint pastels — never used in parent surfaces" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:linear-gradient(180deg,#eef2ff,#faf5ff 55%,#eff6ff);font-family:var(--font-jr);padding:20px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:84px;border-radius:var(--radius-2xl);display:flex;align-items:flex-end;padding:8px 10px;font-size:10px;font-weight:700;color:var(--jr-ink);}
  .cap{margin-top:12px;font-size:12px;color:#6366f1;font-family:var(--font-ui);font-weight:500;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--jr-sky-100)">Sky</div>
    <div class="sw" style="background:var(--jr-indigo-50)">Indigo</div>
    <div class="sw" style="background:var(--jr-purple-50)">Purple</div>
    <div class="sw" style="background:var(--jr-rose-100)">Rose</div>
    <div class="sw" style="background:var(--jr-mint-100)">Mint</div>
    <div class="sw" style="background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff">Primary</div>
  </div>
  <div class="cap">Ease bends the rules — gradients and emoji are welcome here, and only here.</div>
</body></html>
