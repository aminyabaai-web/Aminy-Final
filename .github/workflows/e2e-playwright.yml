name: E2E (Playwright)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        # CI gate = Chromium only, sharded 4 ways (unsharded needs >60 min on
        # ubuntu-latest). Mobile layout is still covered: visual-regression
        # runs mobile/iPhone-SE viewports inside the chromium project.
        # The "Mobile Chrome" device project has never been green in CI
        # (~220 failures were hidden by the old 60-min timeout kills) —
        # stabilize it locally before adding it back as a gate.
        run: npx playwright test --project=chromium --workers=2 --shard=${{ matrix.shard }}/4
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots/traces/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14
