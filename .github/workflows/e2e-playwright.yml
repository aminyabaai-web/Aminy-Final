name: E2E (Playwright)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        # CI runs Chromium + Mobile Chrome only, sharded 4 ways so each job
        # stays well under the timeout (the full two-project suite is ~1040
        # tests and needs >60 min unsharded on ubuntu-latest). Full
        # cross-browser suite still runs locally with `npx playwright test`.
        run: npx playwright test --project=chromium --project="Mobile Chrome" --workers=2 --shard=${{ matrix.shard }}/4
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots/traces/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14
