name: E2E (Playwright)

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        # Gate = chromium functional suite, sharded 4 ways. Includes
        # e2e/design-rubric.spec.ts (A-grade rubric enforcement: clipped
        # button text / unlabeled controls / rendered jargon — chromium-only
        # by design, it self-skips on other projects).
        # Excluded from the gate (run via update-visual-baselines.yml instead):
        #  - "Visual Regression" screenshots: pixel-diff baselines are
        #    environment-coupled (font rasterization differs between machines);
        #    they only pass when baselines are generated IN CI. Regenerate with
        #    the update-visual-baselines workflow after intentional UI changes.
        #  - "Console Error Monitoring" + "Button & Navigation Audit": depend on
        #    deployed-backend state (e.g. edge fn versions), not repo state.
        # screens-batch*.spec.ts + design-audit-report.spec.ts: excluded via
        #    playwright.config.ts testIgnore (CI=true) — these have pre-existing
        #    invalid locator patterns that require backend reachability to fix.
        run: npx playwright test --project=chromium --workers=2 --shard=${{ matrix.shard }}/4 --grep-invert "Visual Regression|Console Error Monitoring|Button & Navigation Audit"
        env:
          CI: true
          # Public client config (the anon key ships in every browser bundle —
          # not a secret). Without these the app renders a BLANK page in CI:
          # .env.local is gitignored, so every content assertion was failing.
          VITE_SUPABASE_URL: https://qpzsvafwcwyrkdolrjbu.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwenN2YWZ3Y3d5cmtkb2xyamJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEzMDAsImV4cCI6MjA3NjczNzMwMH0.bqGspljemM6itV7_x1iSdrWCPkJSU_jRbZduxcaTNeY
          VITE_SENTRY_DSN: https://1c8a5b1cec3156e9daa7d2ba14586f8b@o4510745456672768.ingest.us.sentry.io/4510749632626688
          # Enable B2B-gated screens (provider-portal, etc.) in CI so E2E tests can reach them
          VITE_B2B_ENABLED: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots/traces/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14

  playwright-cross-browser:
    runs-on: ubuntu-latest
    # Firefox + WebKit in a single job outgrew the 40-min cap as the suite
    # grew (every run since 2026-07-06 was killed mid-WebKit). Split per
    # browser so each job runs well inside the cap, and raise it for slack.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }} --workers=2 --grep-invert "Visual Regression|Console Error Monitoring|Button & Navigation Audit"
        env:
          CI: true
          VITE_SUPABASE_URL: https://qpzsvafwcwyrkdolrjbu.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwenN2YWZ3Y3d5cmtkb2xyamJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEzMDAsImV4cCI6MjA3NjczNzMwMH0.bqGspljemM6itV7_x1iSdrWCPkJSU_jRbZduxcaTNeY
          VITE_SENTRY_DSN: https://1c8a5b1cec3156e9daa7d2ba14586f8b@o4510745456672768.ingest.us.sentry.io/4510749632626688
          VITE_B2B_ENABLED: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-cross-browser-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots/traces/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cross-browser-${{ matrix.browser }}
          path: test-results/
          retention-days: 14
