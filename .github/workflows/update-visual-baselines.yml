name: Update visual baselines

# Visual screenshot baselines are environment-coupled (font rasterization
# differs across machines), so they must be generated on the SAME runner
# image CI uses. Run this manually after intentional UI changes; it commits
# regenerated chromium baselines back to the branch you dispatched it on.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: npx playwright test e2e/visual-regression.spec.ts --project=chromium --workers=2 --update-snapshots
        env:
          CI: true

      - name: Commit and push updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/__snapshots__
          if git diff --cached --quiet; then
            echo "No baseline changes."
          else
            git commit -m "test: regenerate visual baselines in CI environment"
            git push
          fi
