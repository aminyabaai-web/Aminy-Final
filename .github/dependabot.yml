version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      dev-tools:
        patterns:
          - "vitest"
          - "typescript"
          - "@playwright/*"
          - "eslint*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
